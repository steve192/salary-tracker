{% extends "base.html" %}
{% block title %}Change Password · Salary Tracker{% endblock %}
{% block content %}
<section>
    <h2>Change password</h2>
    <form method="post" class="stacked">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>Current password
            {{ form.old_password }}
            {{ form.old_password.errors }}
        </label>
        <label>New password
            {{ form.new_password1 }}
            {% if form.new_password1.help_text %}
                <span class="hint">{{ form.new_password1.help_text|safe }}</span>
            {% endif %}
            {{ form.new_password1.errors }}
        </label>
        <label>Confirm new password
            {{ form.new_password2 }}
            {{ form.new_password2.errors }}
        </label>
        <button type="submit">Change password</button>
        <a href="{% url 'settings' %}" role="button" class="secondary">Cancel</a>
    </form>
</section>
{% endblock %}
